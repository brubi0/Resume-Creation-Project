services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resume_chat
      POSTGRES_USER: ${DB_USER:-resume}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-resume} -d resume_chat"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-resume}:${DB_PASSWORD}@db:5432/resume_chat
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SYSTEM_DIR: /app/system
      PROFILES_DIR: /app/profiles
      TEMPLATES_DIR: /app/templates
      DELIVERABLES_DIR: /app/deliverables
      CORS_ORIGINS: https://resume.urkuconsulting.com,http://localhost:5173
    volumes:
      - ../system:/app/system:ro
      - ../profiles:/app/profiles
      - ../templates:/app/templates:ro
      - deliverables:/app/deliverables
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3002:80"
    depends_on:
      - backend

volumes:
  pgdata:
  deliverables:
