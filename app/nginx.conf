server {
    listen 80;
    server_name resume.urkuconsulting.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name resume.urkuconsulting.com;

    ssl_certificate /etc/letsencrypt/live/resume.urkuconsulting.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/resume.urkuconsulting.com/privkey.pem;

    client_max_body_size 10M;

    # API — proxy to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # Claude API calls can take time
    }

    # Frontend — proxy to frontend container
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
